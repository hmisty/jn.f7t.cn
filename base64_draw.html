<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <title>рҹҺЁ еғҸзҙ е·ҘеқҠ В· Jouleverse NFT (24x24)</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="responsive-container">
        <!-- е·Ұдҫ§з»ҳеӣҫеҢә -->
        <div class="draw-panel">
            <div class="tool-row">
                <button class="btn btn-active" id="drawBtn" data-mode="draw">рҹ–ҢпёҸ з”»з¬”</button>
                <button class="btn" id="eraseBtn" data-mode="erase">рҹ§Ҫ ж©Ўзҡ®</button>
                <button class="btn" id="fillBtn" data-mode="fill">рҹӘЈ еЎ«е……</button>
                <button class="btn btn-small" id="undoBtn">вҶ©пёҸ ж’Өй”Җ</button>
                <button class="btn btn-small" id="redoBtn">вҶӘпёҸ йҮҚеҒҡ</button>
                <button class="btn btn-small" id="clearBtn">рҹ—‘пёҸ жё…з©ә</button>
            </div>

            <div class="size-panel">
                <div class="size-item"><label>иЎҢ</label><input type="number" id="rowsInput" class="size-input" min="1" max="24" value="24" readonly disabled></div>
                <div class="size-item"><label>еҲ—</label><input type="number" id="colsInput" class="size-input" min="1" max="24" value="24" readonly disabled></div>
                <button class="btn btn-primary btn-small" id="newCanvasBtn" disabled style="opacity:0.5; cursor:not-allowed;">вңЁ еӣәе®ҡ24x24</button>
            </div>
            <div style="font-size:12px; color:#3c5e9c; margin: -5px 0 10px 15px;">вҡЎ з”»еёғеӨ§е°Ҹеӣәе®ҡдёә24x24</div>

            <div class="color-area">
                <div class="color-swatch" id="colorPickerBtn"></div>
                <span class="color-rgb" id="colorRgbLabel">RGB(255,0,0)</span>
                <div style="margin-left: auto; display: flex; gap:6px;">
                    <button class="btn btn-small" id="savePngBtn">PNG</button>
                    <button class="btn btn-small" id="saveJpgBtn">JPG</button>
                    <button class="btn btn-small" id="saveBmpBtn">BMP</button>
                    <button class="btn btn-small" id="saveIcoBtn">ICO</button>
                </div>
            </div>

            <div class="canvas-wrapper">
                <canvas id="pixelCanvas"></canvas>
            </div>

            <div class="import-area">
                <div style="font-weight:600; margin-bottom:12px;">рҹ“Ө еҜје…ҘеӣҫзүҮиҪ¬еғҸзҙ /Base64</div>
                <label for="imageFile" class="file-label" id="fileLabel">рҹ“Ғ йҖүжӢ©еӣҫзүҮ (иҮӘеҠЁзј©е°ҸиҮі24x24)</label>
                <input type="file" id="imageFile" accept="image/*">
                <div class="flex-row" style="margin-top:12px; justify-content:space-between;">
                    <button class="btn btn-small" id="importToCanvasBtn">в¬ҮпёҸ еҜје…ҘеҲ°з”»еёғ</button>
                    <button class="btn btn-small" id="importToBase64Btn">рҹ”„ зӣҙжҺҘиҪ¬Base64</button>
                </div>
                <div style="font-size:12px; color:#3c5e9c; margin-top:8px;">* еӣҫзүҮдјҡзј©ж”ҫеҲ°24x24</div>
            </div>
        </div>

        <!-- еҸідҫ§Base64йқўжқҝ + NFT й“ёйҖ  -->
        <div class="base64-panel">
            <div class="radio-group">
                <label><input type="radio" name="base64Format" value="with_prefix" checked> еёҰеүҚзјҖ</label>
                <label><input type="radio" name="base64Format" value="pure"> зәҜBase64</label>
            </div>

            <button class="btn btn-primary" id="convertBtn" style="margin-bottom:12px;">рҹ”„ иҪ¬жҚўеҪ“еүҚз”»дҪңдёәBase64</button>
            <textarea id="base64Result" class="base64-text" placeholder="Base64иҫ“еҮә..." readonly></textarea>

            <div class="button-group">
                <button class="btn" id="copyBtn" disabled style="flex:1;">рҹ“Ӣ еӨҚеҲ¶</button>
                <button class="btn" id="saveTxtBtn" disabled style="flex:1;">рҹ’ҫ дҝқеӯҳTXT</button>
            </div>

            <!-- NFT й“ёйҖ еҢәеҹҹ (е·Ій…ҚзҪ®JouleverseеҗҲзәҰ) -->
            <div class="nft-mint-area">
                <div class="nft-title">вӣ“пёҸ Jouleverse NFT В· PixelArt (24x24)</div>
                <div class="nft-row">
                    <span class="network-badge">Jouleverse (3666)</span>
                    <button class="btn btn-small" id="connectWalletBtn">рҹ”Ң иҝһжҺҘй’ұеҢ…</button>
                </div>
                <div id="walletAddressDisplay" class="wallet-info" style="margin-bottom:12px;">жңӘиҝһжҺҘ</div>
                
                <input type="text" id="nftNameInput" class="nft-input" placeholder="NFT еҗҚз§° (еҸҜйҖү)" value="PixelArt #">
                
                <div class="nft-row" style="margin-top:15px; justify-content: space-between;">
                    <button class="btn btn-primary" id="mintNftBtn" style="flex:2;" disabled>рҹ–јпёҸ й“ёйҖ NFT (24x24з”»дҪң)</button>
                    <button class="btn btn-small" id="refreshNftBtn" style="flex:1;">рҹ”„ еҲ·ж–°жҲ‘зҡ„NFT</button>
                </div>
                
                <!-- жҳҫзӨәз”ЁжҲ·жӢҘжңүзҡ„NFT -->
                <div id="myNftsContainer" class="my-nfts-area" style="display:none;">
                    <div style="font-weight:600; margin-bottom:10px;">рҹ“Ұ жҲ‘зҡ„NFT <span id="finalizedIndicator" style="color:#b45309; font-size:12px; margin-left:8px;"></span></div>
                    <div id="nftList"></div>
                </div>
                
                <div id="mintStatus" class="chain-hint">вҡЎ 24x24 з”»еёғеӣәе®ҡ В· е®ҡзЁҝеҗҺйҡҗи—Ҹй”ҖжҜҒ</div>
            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
